kind = "web"
previewPath = "/"
title = "Data Merger"
version = "1.0.0"
id = "artifacts/data-merger"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 18437

[services.development]
run = "pnpm --filter @workspace/data-merger run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/data-merger", "run", "build" ]
publicDir = "artifacts/data-merger/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "18437"
BASE_PATH = "/"
